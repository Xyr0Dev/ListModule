<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>XK TEAM • Zodiac Modules</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at 20% 30%, #0a0f2a, #02030c);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* canvas stars */
        #starsCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .nebula {
            position: fixed;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(100, 80, 200, 0.15), transparent 70%);
            border-radius: 50%;
            top: -30%;
            left: -30%;
            z-index: -1;
            animation: nebulaMove 22s infinite alternate;
        }

        @keyframes nebulaMove {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(8%, 5%) scale(1.3); opacity: 0.8; }
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 5;
        }

        .brand {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .brand h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFF, #C084FC, #60A5FA);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(192,132,252,0.3);
        }
        .brand p {
            color: #9ca3af;
            font-size: 0.9rem;
            margin-top: 6px;
        }

        /* grid module */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 1.8rem;
            margin: 2.5rem 0 2rem;
        }

        .module-card {
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.6rem;
            border: 1px solid rgba(100, 80, 200, 0.4);
            transition: all 0.3s ease;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .module-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05), transparent);
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
        }
        .module-card:hover::before {
            opacity: 1;
        }
        .module-card:hover {
            transform: translateY(-6px);
            border-color: #c084fc;
            box-shadow: 0 20px 35px -12px rgba(100, 80, 200, 0.4);
        }
        .zodiac-icon {
            font-size: 2.8rem;
            margin-bottom: 0.5rem;
        }
        .module-name {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FDE047, #FFA2E7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 4px;
        }
        .price-tag {
            font-size: 1.2rem;
            font-weight: 700;
            color: #FCD34D;
            margin: 10px 0;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 12px;
        }
        .detail-btn, .buy-btn {
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }
        .detail-btn {
            background: rgba(255,255,255,0.1);
            color: #CBD5E1;
            border: 1px solid #7C3AED;
        }
        .detail-btn:hover {
            background: #7C3AED;
            color: white;
        }
        .buy-btn {
            background: linear-gradient(95deg, #1E3A8A, #7C3AED);
            color: white;
            box-shadow: 0 4px 12px rgba(124,58,237,0.3);
        }
        .buy-btn:hover {
            transform: scale(0.96);
            background: linear-gradient(95deg, #2563EB, #8B5CF6);
        }

        /* features panel */
        .features-panel {
            background: rgba(8, 12, 25, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1.8rem;
            margin: 1.5rem 0 2rem;
            border: 1px solid rgba(124,58,237,0.5);
            transition: 0.3s;
        }
        .features-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.8rem;
        }
        .features-header h3 {
            font-size: 1.4rem;
            font-weight: 700;
        }
        .features-list {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 0.8rem;
        }
        .feature-item {
            background: rgba(0,0,0,0.4);
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.85rem;
            font-weight: 500;
            border-left: 3px solid #FCD34D;
        }
        .close-feature {
            margin-left: auto;
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .purchase-tab {
            background: rgba(8, 12, 25, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid rgba(124,58,237,0.4);
        }
        .channel-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(100deg, #0F2E3F, #1E3A8A);
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 700;
            text-decoration: none;
            color: white;
            font-size: 0.9rem;
            transition: 0.2s;
            border: 1px solid #7C3AED;
        }
        .channel-button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 18px #7C3AED;
        }
        .footer {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.7rem;
            color: #5a6e8c;
        }
        @media (max-width: 680px) {
            .brand h1 { font-size: 2rem; }
            .module-name { font-size: 1.3rem; }
            .btn-group { flex-direction: column; gap: 8px; }
            .detail-btn, .buy-btn { width: 100%; }
        }
    </style>
</head>
<body>

<canvas id="starsCanvas"></canvas>
<div class="nebula"></div>

<div class="container">
    <div class="brand">
        <h1>✨ XK TEAM • ZODIAC MODULES ✨</h1>
        <p>Pilih module astralmu • unlock potensi tersembunyi</p>
    </div>

    <div class="modules-grid" id="modulesGrid"></div>

    <!-- Panel fitur dinamis -->
    <div id="featuresPanel" class="features-panel" style="display: none;">
        <div class="features-header">
            <i class="fas fa-star-of-life" style="color: #FCD34D;"></i>
            <h3 id="featureModuleName">Module Name</h3>
            <button id="closeFeatureBtn" class="close-feature"><i class="fas fa-times-circle"></i></button>
        </div>
        <div id="featureListContainer" class="features-list"></div>
    </div>

    <div class="purchase-tab">
        <h2><i class="fas fa-shopping-cart"></i> Buy Module → <i class="fab fa-whatsapp"></i></h2>
        <p>Setelah melihat fitur, klik tombol di bawah untuk order via WhatsApp Channel</p>
        <a href="https://whatsapp.com/channel/0029Vb8VtOLAYlUKg1Ayhm21" class="channel-button" target="_blank" id="whatsappChannelBtn">
            <i class="fab fa-whatsapp"></i> Beli via WhatsApp Channel
        </a>
        <div id="selectedModuleHint" style="margin-top: 12px; font-size: 0.7rem; opacity: 0.8;"></div>
    </div>

    <div class="footer">
        © 2025 XK TEAM • Setiap module siap pakai & support 24/7 via channel.
    </div>
</div>

<script>
    // Data module (nama, harga, ikon, fitur)
    const modulesData = [
        {
            name: "Aries",
            price: "5K",
            priceId: 5000,
            icon: "♈️",
            features: [
                "sensitivitas 105%",
                "tracker 10%"
            ]
        },
        {
            name: "Capricorn",
            price: "10K",
            priceId: 10000,
            icon: "♑️",
            features: [
                "sensitivitas 180%",
                "tracker 17%",
                "stabilizer aim 20%"
            ]
        },
        {
            name: "Pisces",
            price: "15K",
            priceId: 15000,
            icon: "♓️",
            features: [
                "sensitivitas 230%",
                "tracker 24%",
                "stabilizer aim 28%",
                "optimize 30%"
            ]
        },
        {
            name: "Sagitarius",
            price: "20K",
            priceId: 20000,
            icon: "♐️",
            features: [
                "sensitivitas 275%",
                "tracker 34%",
                "stabilizer aim 36%",
                "optimize 50%",
                "head aim 20%"
            ]
        },
        {
            name: "Aquarius",
            price: "30K",
            priceId: 30000,
            icon: "♒️",
            features: [
                "sensitivitas 340%",
                "tracker 44%",
                "stabilizer aim 46%",
                "optimize 66%",
                "head aim 35%",
                "reduce vibrate 20%"
            ]
        }
    ];

    // Render grid modules
    const gridContainer = document.getElementById('modulesGrid');
    const featuresPanel = document.getElementById('featuresPanel');
    const featureModuleName = document.getElementById('featureModuleName');
    const featureListContainer = document.getElementById('featureListContainer');
    const closeFeatureBtn = document.getElementById('closeFeatureBtn');
    const selectedModuleHint = document.getElementById('selectedModuleHint');

    let currentSelectedModule = null;

    function renderModules() {
        gridContainer.innerHTML = '';
        modulesData.forEach(mod => {
            const card = document.createElement('div');
            card.className = 'module-card';
            card.setAttribute('data-module', mod.name);
            card.innerHTML = `
                <div class="zodiac-icon">${mod.icon}</div>
                <div class="module-name">${mod.name}</div>
                <div class="price-tag">Rp ${mod.price}</div>
                <div class="btn-group">
                    <button class="detail-btn" data-module="${mod.name}"><i class="fas fa-chart-line"></i> Lihat Fitur</button>
                    <button class="buy-btn" data-module="${mod.name}" data-price="${mod.price}"><i class="fas fa-shopping-cart"></i> Beli</button>
                </div>
            `;
            gridContainer.appendChild(card);
        });

        // attach event listeners
        document.querySelectorAll('.detail-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const moduleName = btn.getAttribute('data-module');
                showFeatures(moduleName);
            });
        });

        document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const moduleName = btn.getAttribute('data-module');
                const price = btn.getAttribute('data-price');
                selectedModuleHint.innerHTML = `✨ Pesanan: <strong>${moduleName}</strong> | Harga: Rp ${price} ✨<br>Klik tombol di atas untuk melanjutkan pembelian via WhatsApp Channel.`;
                // scroll ke purchase tab
                document.querySelector('.purchase-tab').scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
        });
    }

    function showFeatures(moduleName) {
        const module = modulesData.find(m => m.name === moduleName);
        if (!module) return;
        currentSelectedModule = module;
        featureModuleName.innerText = `${module.icon} ${module.name} – Fitur Unggulan`;
        featureListContainer.innerHTML = '';
        module.features.forEach(feat => {
            const chip = document.createElement('div');
            chip.className = 'feature-item';
            chip.innerHTML = `<i class="fas fa-bolt" style="margin-right: 8px; color: #FCD34D;"></i> ${feat}`;
            featureListContainer.appendChild(chip);
        });
        featuresPanel.style.display = 'block';
        featuresPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    closeFeatureBtn.addEventListener('click', () => {
        featuresPanel.style.display = 'none';
    });

    // stars animation (sama seperti sebelumnya)
    const starsCanvas = document.getElementById('starsCanvas');
    const ctx = starsCanvas.getContext('2d');
    let width, height;
    let stars = [];
    let shootingStars = [];

    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        starsCanvas.width = width;
        starsCanvas.height = height;
    }

    function initStars() {
        stars = [];
        const starCount = Math.floor(width * height / 4500);
        for (let i = 0; i < starCount; i++) {
            stars.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: Math.random() * 2.2 + 0.6,
                alpha: Math.random() * 0.7 + 0.3,
                twinkle: Math.random() * 0.05 + 0.02,
            });
        }
    }

    function drawStars() {
        ctx.clearRect(0, 0, width, height);
        for (let s of stars) {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 240, 200, ${s.alpha + Math.sin(Date.now() * s.twinkle) * 0.15})`;
            ctx.fill();
        }
        for (let i = shootingStars.length-1; i >= 0; i--) {
            let ss = shootingStars[i];
            ctx.beginPath();
            ctx.moveTo(ss.x, ss.y);
            ctx.lineTo(ss.x - ss.speedX * 15, ss.y - ss.speedY * 15);
            ctx.lineWidth = 2;
            ctx.strokeStyle = `rgba(255, 255, 200, ${ss.alpha})`;
            ctx.stroke();
            ss.x += ss.speedX;
            ss.y += ss.speedY;
            ss.alpha -= 0.008;
            if (ss.x > width + 50 || ss.y > height + 50 || ss.x < -50 || ss.y < -50 || ss.alpha <= 0) {
                shootingStars.splice(i,1);
            }
        }
        requestAnimationFrame(drawStars);
    }

    function createShootingStar() {
        if (Math.random() < 0.02) {
            shootingStars.push({
                x: Math.random() * width,
                y: Math.random() * height * 0.3,
                speedX: (Math.random() * 4 + 2) * (Math.random() > 0.5 ? 1 : -1),
                speedY: Math.random() * 3 + 1.5,
                alpha: 0.7
            });
        }
    }

    window.addEventListener('resize', () => {
        resizeCanvas();
        initStars();
    });
    resizeCanvas();
    initStars();
    drawStars();
    setInterval(createShootingStar, 1800);

    renderModules();
</script>
</body>
</html>
