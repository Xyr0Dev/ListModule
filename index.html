<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>XK TEAM • Zodiac Modules</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #070b1a, #010106);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            color: #f0f3fa;
            position: relative;
        }

        /* Stars static (light) */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 70% 85%, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40% 50%, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 85% 15%, #f9f3c0, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 10% 70%, #c4e0ff, rgba(0,0,0,0));
            background-size: 250px 250px, 300px 300px, 200px 200px, 350px 350px, 280px 280px;
            background-repeat: no-repeat;
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 1.8rem;
            position: relative;
            z-index: 2;
        }

        /* header premium */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f3e7c9, #e0b3ff, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 12px rgba(139,92,246,0.3);
        }
        .hero .sub {
            font-size: 1rem;
            color: #b9c7e0;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .hero .sub i {
            color: #f59e0b;
        }

        /* grid cards */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin: 2.5rem 0 2rem;
        }

        .module-card {
            background: rgba(10, 18, 30, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            padding: 1.6rem;
            border: 1px solid rgba(139, 92, 246, 0.35);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.4);
            text-align: center;
        }
        .module-card:hover {
            transform: translateY(-8px);
            border-color: #c084fc;
            box-shadow: 0 25px 40px -12px rgba(139, 92, 246, 0.4);
            background: rgba(15, 25, 45, 0.8);
        }

        .zodiac-icon {
            font-size: 3.2rem;
            margin-bottom: 0.6rem;
            display: inline-block;
            filter: drop-shadow(0 0 6px rgba(192,132,252,0.6));
        }
        .module-name {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffe6b3, #ffb347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .price {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fcd34d;
            margin: 0.8rem 0;
            text-shadow: 0 0 6px rgba(253, 186, 116, 0.4);
        }
        .price small {
            font-size: 0.8rem;
            font-weight: 500;
            color: #a0aec0;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.8rem;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-outline {
            background: rgba(255,255,255,0.05);
            border: 1px solid #a855f7;
            color: #e9d5ff;
        }
        .btn-outline:hover {
            background: #7c3aed;
            color: white;
            transform: scale(0.96);
        }
        .btn-primary {
            background: linear-gradient(95deg, #1e3a8a, #8b5cf6);
            color: white;
            box-shadow: 0 4px 12px rgba(139,92,246,0.4);
        }
        .btn-primary:hover {
            transform: scale(0.96);
            background: linear-gradient(95deg, #2563eb, #a78bfa);
        }

        /* feature panel premium */
        .feature-panel {
            background: rgba(8, 12, 28, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 1.8rem;
            margin: 1.5rem 0 2rem;
            border: 1px solid rgba(168, 85, 247, 0.5);
            transition: 0.2s;
            display: none;
        }
        .feature-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.8rem;
            margin-bottom: 1rem;
        }
        .feature-header h3 {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .close-feature {
            background: none;
            border: none;
            color: #bdb4e6;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-feature:hover {
            color: #ff8181;
        }
        .features-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .feature-chip {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            border-left: 3px solid #fcd34d;
            backdrop-filter: blur(4px);
        }

        /* buy section */
        .buy-section {
            background: rgba(10, 18, 30, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 1.5rem;
            text-align: center;
            margin-top: 1rem;
            border: 1px solid rgba(139,92,246,0.4);
        }
        .buy-section h3 {
            font-size: 1.4rem;
            margin-bottom: 0.3rem;
        }
        .buy-section p {
            font-size: 0.8rem;
            color: #cbd5e6;
            margin-bottom: 1rem;
        }
        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(100deg, #0f2e3f, #1e3a8a);
            padding: 12px 32px;
            border-radius: 60px;
            font-weight: 700;
            text-decoration: none;
            color: white;
            font-size: 0.9rem;
            border: 1px solid #a855f7;
            transition: 0.2s;
        }
        .whatsapp-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 18px #a855f7;
            background: linear-gradient(100deg, #1e3a8a, #4f46e5);
        }
        .order-hint {
            margin-top: 12px;
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.7rem;
            color: #6c7a9e;
        }

        @media (max-width: 680px) {
            .hero h1 { font-size: 2rem; }
            .module-name { font-size: 1.4rem; }
            .price { font-size: 1.2rem; }
            .btn-group { flex-direction: column; gap: 10px; }
            .btn { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="stars"></div>
<div class="container">
    <div class="hero">
        <h1>✨ List Module XK TEAM ✨</h1>
        <div class="sub">
            <i class="fas fa-skull-crossbones"></i> Mau aim horor? 
            <strong style="color:#fbbf24">BUY MODULE XK TEAM DONG 😜</strong>
            <i class="fas fa-fire"></i>
        </div>
    </div>

    <div class="modules-grid" id="modulesGrid"></div>

    <!-- panel fitur -->
    <div id="featurePanel" class="feature-panel">
        <div class="feature-header">
            <h3><i class="fas fa-chart-simple"></i> <span id="featureModuleName"></span></h3>
            <button class="close-feature" id="closeFeatureBtn"><i class="fas fa-times-circle"></i></button>
        </div>
        <div id="featureList" class="features-list"></div>
    </div>

    <div class="buy-section">
        <h3><i class="fab fa-whatsapp"></i> Order via Official Channel</h3>
        <p>Klik tombol di bawah untuk melanjutkan pembelian module pilihanmu</p>
        <a href="https://whatsapp.com/channel/0029Vb8VtOLAYlUKg1Ayhm21" class="whatsapp-btn" target="_blank" id="mainOrderBtn">
            <i class="fab fa-whatsapp"></i> Beli Sekarang
        </a>
        <div id="orderHint" class="order-hint"></div>
    </div>

    <div class="footer">
        © 2026 XK TEAM • All modules ready to boost your game.
    </div>
</div>

<script>
    // Data module sesuai permintaan
    const modules = [
        {
            name: "Aries",
            price: "5K",
            icon: "♈️",
            features: [
                "sensitivitas 105%",
                "tracker 10%"
            ]
        },
        {
            name: "Capricorn",
            price: "10K",
            icon: "♑️",
            features: [
                "sensitivitas 180%",
                "tracker 17%",
                "stabilizer aim 20%"
            ]
        },
        {
            name: "Pisces",
            price: "15K",
            icon: "♓️",
            features: [
                "sensitivitas 230%",
                "tracker 24%",
                "stabilizer aim 28%",
                "optimize 30%"
            ]
        },
        {
            name: "Sagitarius",
            price: "20K",
            icon: "♐️",
            features: [
                "sensitivitas 275%",
                "tracker 34%",
                "stabilizer aim 36%",
                "optimize 50%",
                "head aim 20%"
            ]
        },
        {
            name: "Aquarius",
            price: "30K",
            icon: "♒️",
            features: [
                "sensitivitas 340%",
                "tracker 44%",
                "stabilizer aim 46%",
                "optimize 66%",
                "head aim 35%",
                "reduce vibrate 20%"
            ]
        }
    ];

    const grid = document.getElementById('modulesGrid');
    const featurePanel = document.getElementById('featurePanel');
    const featureModuleNameSpan = document.getElementById('featureModuleName');
    const featureListDiv = document.getElementById('featureList');
    const closeFeatureBtn = document.getElementById('closeFeatureBtn');
    const orderHint = document.getElementById('orderHint');

    function renderModules() {
        grid.innerHTML = '';
        modules.forEach(mod => {
            const card = document.createElement('div');
            card.className = 'module-card';
            card.innerHTML = `
                <div class="zodiac-icon">${mod.icon}</div>
                <div class="module-name">${mod.name}</div>
                <div class="price">Rp ${mod.price} <small></small></div>
                <div class="btn-group">
                    <button class="btn btn-outline" data-name="${mod.name}"><i class="fas fa-chart-line"></i> Lihat Fitur</button>
                    <button class="btn btn-primary" data-name="${mod.name}" data-price="${mod.price}"><i class="fas fa-shopping-cart"></i> Beli</button>
                </div>
            `;
            grid.appendChild(card);
        });

        // event listener untuk tombol fitur & beli
        document.querySelectorAll('.btn-outline').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const moduleName = btn.getAttribute('data-name');
                showFeatures(moduleName);
            });
        });

        document.querySelectorAll('.btn-primary').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const moduleName = btn.getAttribute('data-name');
                const price = btn.getAttribute('data-price');
                orderHint.innerHTML = `✨ Pesanan: <strong>${moduleName}</strong> | Harga: Rp ${price} ✨<br>Klik tombol WA di atas untuk order.`;
                document.querySelector('.buy-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
        });
    }

    function showFeatures(moduleName) {
        const mod = modules.find(m => m.name === moduleName);
        if (!mod) return;
        featureModuleNameSpan.innerHTML = `${mod.icon} ${mod.name} – Fitur Astral`;
        featureListDiv.innerHTML = '';
        mod.features.forEach(feat => {
            const chip = document.createElement('div');
            chip.className = 'feature-chip';
            chip.innerHTML = `<i class="fas fa-star-of-life" style="margin-right: 8px; color: #FBBF24;"></i> ${feat}`;
            featureListDiv.appendChild(chip);
        });
        featurePanel.style.display = 'block';
        featurePanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    closeFeatureBtn.addEventListener('click', () => {
        featurePanel.style.display = 'none';
    });

    renderModules();
</script>
</body>
</html>
