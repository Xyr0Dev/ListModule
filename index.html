<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>XK TEAM • Zodiac Modules</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #070b1a, #010106);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f0f3fa;
            line-height: 1.5;
            min-height: 100vh;
            position: relative;
        }

        /* animated gradient background */
        .bg-glow {
            position: fixed;
            top: -30%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 40% 50%, rgba(100, 80, 200, 0.2), transparent 60%);
            filter: blur(80px);
            z-index: -2;
            animation: pulseGlow 8s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.7; transform: scale(1.05); }
        }

        /* floating stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 15% 30%, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 65% 85%, #e0e7ff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 88% 45%, #bfdbfe, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 35% 70%, #c7d2fe, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 5% 95%, #fff, rgba(0,0,0,0));
            background-size: 250px 250px, 300px 300px, 280px 280px, 320px 320px, 400px 400px;
            background-repeat: no-repeat;
            opacity: 0.5;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1.8rem 3rem;
            position: relative;
            z-index: 2;
        }

        /* header with glow */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(145deg, #FFFFFF, #C084FC, #60A5FA);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(192,132,252,0.3);
            animation: titleGlow 3s infinite alternate;
        }
        @keyframes titleGlow {
            0% { text-shadow: 0 0 5px rgba(192,132,252,0.2); }
            100% { text-shadow: 0 0 25px rgba(192,132,252,0.6); }
        }
        .hero .tagline {
            font-size: 1.1rem;
            font-weight: 500;
            color: #cbd5e6;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            backdrop-filter: blur(2px);
        }
        .hero .tagline i {
            color: #fbbf24;
            filter: drop-shadow(0 0 4px #fbbf24);
        }

        /* grid */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin: 2.5rem 0 2rem;
        }

        .module-card {
            background: rgba(12, 18, 30, 0.55);
            backdrop-filter: blur(14px);
            border-radius: 36px;
            padding: 1.8rem 1.5rem;
            border: 1px solid rgba(96, 165, 250, 0.25);
            transition: all 0.3s ease;
            box-shadow: 0 15px 35px -12px rgba(0, 0, 0, 0.4);
        }
        .module-card:hover {
            transform: translateY(-8px);
            border-color: rgba(139, 92, 246, 0.8);
            box-shadow: 0 25px 45px -12px rgba(139, 92, 246, 0.3);
            background: rgba(15, 22, 38, 0.8);
        }

        .module-name {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #E0E7FF, #A78BFA);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .price {
            font-size: 1.6rem;
            font-weight: 700;
            color: #FCD34D;
            margin: 1rem 0;
            text-shadow: 0 0 8px rgba(253, 186, 116, 0.4);
        }
        .price small {
            font-size: 0.8rem;
            font-weight: 500;
            color: #94a3b8;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 1.2rem;
        }
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: none;
            background: transparent;
        }
        .btn-outline {
            background: rgba(255,255,255,0.05);
            border: 1px solid #8b5cf6;
            color: #c4b5fd;
        }
        .btn-outline:hover {
            background: #8b5cf6;
            color: white;
            transform: scale(0.96);
            box-shadow: 0 0 12px #8b5cf6;
        }
        .btn-primary {
            background: linear-gradient(95deg, #1e2a5e, #7c3aed);
            color: white;
            box-shadow: 0 4px 12px rgba(124,58,237,0.4);
        }
        .btn-primary:hover {
            transform: scale(0.96);
            background: linear-gradient(95deg, #2d3a7e, #9b6eff);
            box-shadow: 0 0 14px #8b5cf6;
        }

        /* feature panel (glow) */
        .feature-panel {
            background: rgba(8, 12, 24, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 36px;
            padding: 1.6rem;
            margin: 1.8rem 0 2rem;
            border: 1px solid rgba(139, 92, 246, 0.5);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
            display: none;
        }
        .feature-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 0.8rem;
            margin-bottom: 1rem;
        }
        .feature-header h3 {
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .close-feature {
            background: none;
            border: none;
            color: #a5b4fc;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-feature:hover {
            color: #ff8a8a;
            transform: scale(1.1);
        }
        .feature-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .feature-chip {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            border-left: 3px solid #fcd34d;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .feature-chip i {
            color: #facc15;
            font-size: 0.8rem;
        }

        /* buy card */
        .buy-card {
            background: rgba(10, 16, 26, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 36px;
            padding: 1.8rem;
            text-align: center;
            margin-top: 1rem;
            border: 1px solid rgba(96, 165, 250, 0.4);
            transition: 0.2s;
        }
        .buy-card:hover {
            border-color: #a855f7;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.2);
        }
        .buy-card h3 {
            font-size: 1.4rem;
            margin-bottom: 0.3rem;
        }
        .buy-card p {
            font-size: 0.8rem;
            color: #b9c7e0;
            margin-bottom: 1rem;
        }
        .wa-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(100deg, #0f2e3f, #1e3a8a);
            padding: 12px 32px;
            border-radius: 60px;
            font-weight: 700;
            text-decoration: none;
            color: white;
            border: 1px solid #8b5cf6;
            transition: 0.2s;
        }
        .wa-link:hover {
            transform: scale(1.02);
            box-shadow: 0 0 18px #a855f7;
            background: linear-gradient(100deg, #1e3a8a, #4f46e5);
        }
        .order-hint {
            margin-top: 12px;
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.7rem;
            color: #5f6f9c;
        }

        @media (max-width: 680px) {
            .hero h1 { font-size: 2rem; }
            .module-name { font-size: 1.5rem; }
            .price { font-size: 1.3rem; }
            .btn-group { flex-direction: column; align-items: stretch; }
            .btn { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="stars"></div>

<div class="container">
    <div class="hero">
        <h1>List Module XK TEAM</h1>
        <div class="tagline">
            <i class="fas fa-skull-crossbones"></i> Mau aim horor? 
            <strong style="color: #facc15;">BUY MODULE XK TEAM DONG 😜</strong>
            <i class="fas fa-fire"></i>
        </div>
    </div>

    <div class="modules-grid" id="modulesGrid"></div>

    <!-- Feature Panel -->
    <div id="featurePanel" class="feature-panel">
        <div class="feature-header">
            <h3><i class="fas fa-gem" style="color: #facc15;"></i> <span id="featureModuleName"></span></h3>
            <button class="close-feature" id="closeFeatureBtn"><i class="fas fa-times-circle"></i></button>
        </div>
        <div id="featureList" class="feature-list"></div>
    </div>

    <div class="buy-card">
        <h3><i class="fab fa-whatsapp"></i> Order via Official Channel</h3>
        <p>Klik tombol di bawah untuk membeli module pilihanmu</p>
        <a href="https://whatsapp.com/channel/0029Vb8VtOLAYlUKg1Ayhm21" class="wa-link" target="_blank">
            <i class="fab fa-whatsapp"></i> Beli Sekarang
        </a>
        <div id="orderHint" class="order-hint"></div>
    </div>

    <div class="footer">
        © 2026 XK TEAM • Elevate your performance.
    </div>
</div>

<script>
    const modulesData = [
        {
            name: "Aries",
            price: "5K",
            features: ["sensitivitas 105%", "tracker 10%"]
        },
        {
            name: "Capricorn",
            price: "10K",
            features: ["sensitivitas 180%", "tracker 17%", "stabilizer aim 20%"]
        },
        {
            name: "Pisces",
            price: "15K",
            features: ["sensitivitas 230%", "tracker 24%", "stabilizer aim 28%", "optimize 30%"]
        },
        {
            name: "Sagitarius",
            price: "20K",
            features: ["sensitivitas 275%", "tracker 34%", "stabilizer aim 36%", "optimize 50%", "head aim 20%"]
        },
        {
            name: "Aquarius",
            price: "30K",
            features: ["sensitivitas 340%", "tracker 44%", "stabilizer aim 46%", "optimize 66%", "head aim 35%", "reduce vibrate 20%"]
        }
    ];

    const grid = document.getElementById('modulesGrid');
    const featurePanel = document.getElementById('featurePanel');
    const featureModuleSpan = document.getElementById('featureModuleName');
    const featureListDiv = document.getElementById('featureList');
    const closeBtn = document.getElementById('closeFeatureBtn');
    const orderHint = document.getElementById('orderHint');

    function renderModules() {
        grid.innerHTML = '';
        modulesData.forEach(mod => {
            const card = document.createElement('div');
            card.className = 'module-card';
            card.innerHTML = `
                <div class="module-name">${mod.name}</div>
                <div class="price">Rp ${mod.price} <small></small></div>
                <div class="btn-group">
                    <button class="btn btn-outline" data-name="${mod.name}"><i class="fas fa-chart-line"></i> Lihat Fitur</button>
                    <button class="btn btn-primary" data-name="${mod.name}" data-price="${mod.price}"><i class="fas fa-shopping-cart"></i> Beli</button>
                </div>
            `;
            grid.appendChild(card);
        });

        document.querySelectorAll('.btn-outline').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const name = btn.getAttribute('data-name');
                showFeatures(name);
            });
        });

        document.querySelectorAll('.btn-primary').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const name = btn.getAttribute('data-name');
                const price = btn.getAttribute('data-price');
                orderHint.innerHTML = `✨ Pesanan: <strong>${name}</strong> | Harga: Rp ${price} ✨<br>Klik tombol WA di atas untuk order.`;
                document.querySelector('.buy-card').scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
        });
    }

    function showFeatures(moduleName) {
        const mod = modulesData.find(m => m.name === moduleName);
        if (!mod) return;
        featureModuleSpan.innerHTML = `${mod.name} – fitur astral`;
        featureListDiv.innerHTML = '';
        mod.features.forEach(f => {
            const chip = document.createElement('div');
            chip.className = 'feature-chip';
            chip.innerHTML = `<i class="fas fa-crown"></i> ${f}`;
            featureListDiv.appendChild(chip);
        });
        featurePanel.style.display = 'block';
        featurePanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    closeBtn.addEventListener('click', () => {
        featurePanel.style.display = 'none';
    });

    renderModules();
</script>
</body>
</html>
